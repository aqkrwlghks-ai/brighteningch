<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 설교 아카이브</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
<style>
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
    background-color: #fdfbf7;
    color: #292524;
  }
  .wood-gradient { background: linear-gradient(135deg, #7b5e43 0%, #5a402a 100%); }
  .emerald-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
  .card-shadow { box-shadow: 0 10px 25px -5px rgba(90, 64, 42, 0.08), 0 8px 10px -6px rgba(90, 64, 42, 0.04); }
  .fade-in { animation: fadeIn 0.3s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 0.75rem; }
  .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .tag-pill { transition: all .15s ease; }
  .tag-pill.active { background: #059669 !important; color: white !important; border-color: #059669 !important; }
  textarea, input, select { font-family: inherit; }
  ::placeholder { color: #a8a29e; }
</style>
</head>
<body class="antialiased pb-12">

<main class="max-w-2xl mx-auto bg-white min-h-screen card-shadow sm:rounded-2xl sm:mt-8 overflow-hidden relative">

  <!-- ================= HOME VIEW ================= -->
  <div id="home-view" class="block fade-in">
    <header class="wood-gradient text-white p-8 text-center relative overflow-hidden">
      <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]"></div>
      <div class="relative z-10">
        <span class="inline-block py-1 px-3 rounded-full bg-white/20 text-xs font-semibold mb-4 tracking-wider text-amber-50 backdrop-blur-sm">
          나만의 설교 아카이브
        </span>
        <h1 class="text-3xl sm:text-4xl font-bold leading-tight mb-3 break-keep">
          들었던 말씀,<br>다시 꺼내보기
        </h1>
        <p class="text-amber-100/90 text-sm sm:text-base font-light break-keep">
          설교를 정리하고, 검색하고, 다시 묵상하는 공간
        </p>
      </div>
    </header>

    <div class="p-6 sm:p-8 space-y-6">

      <!-- 검색 + 추가 버튼 -->
      <div class="flex gap-2">
        <div class="relative flex-1">
          <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 text-sm"></i>
          <input id="search-input" type="text" placeholder="제목·설교자·구절·태그 검색"
            class="w-full pl-9 pr-3 py-2.5 rounded-xl border border-stone-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400/50 focus:border-emerald-400">
        </div>
        <button onclick="openForm()" class="px-4 py-2.5 rounded-xl emerald-gradient text-white text-sm font-bold shadow-sm hover:opacity-90 transition-all whitespace-nowrap">
          <i class="fas fa-plus mr-1"></i> 추가
        </button>
      </div>

      <!-- 설교자 필터 -->
      <div id="speaker-filter" class="flex flex-wrap gap-2"></div>

      <!-- 태그 필터 -->
      <div id="tag-filter" class="flex flex-wrap gap-2"></div>

      <!-- 목록 -->
      <div>
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-lg font-bold text-stone-800">설교 목록</h2>
          <span id="count-badge" class="text-xs font-bold px-3 py-1 bg-stone-100 text-stone-600 rounded-full">0개</span>
        </div>
        <div id="sermon-list" class="space-y-3"></div>
        <div id="empty-state" class="hidden text-center py-16 text-stone-400">
          <i class="fas fa-book-open text-3xl mb-3"></i>
          <p class="text-sm">아직 등록된 설교가 없습니다.<br>오른쪽 위 '추가' 버튼으로 첫 설교를 등록해보세요.</p>
        </div>
      </div>

      <!-- 데이터 관리 -->
      <div class="pt-4 border-t border-stone-100 flex items-center justify-center gap-4 text-xs text-stone-400">
        <button onclick="exportData()" class="hover:text-emerald-600 transition-colors"><i class="fas fa-download mr-1"></i>내보내기(JSON)</button>
        <span>·</span>
        <label class="hover:text-emerald-600 transition-colors cursor-pointer">
          <i class="fas fa-upload mr-1"></i>가져오기(JSON)
          <input type="file" accept="application/json" class="hidden" onchange="importData(event)">
        </label>
      </div>
    </div>
  </div>

  <!-- ================= DETAIL VIEW ================= -->
  <div id="detail-view" class="hidden fade-in bg-white min-h-screen">
    <div class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-stone-100 p-4 flex items-center justify-between shadow-sm">
      <button onclick="goHome()" class="text-stone-500 hover:text-stone-800 flex items-center gap-2 font-medium transition-colors">
        <i class="fas fa-arrow-left"></i> 목록으로
      </button>
      <div class="flex items-center gap-2">
        <button onclick="editCurrent()" class="text-xs font-bold px-3 py-1 bg-stone-100 text-stone-600 rounded-full hover:bg-stone-200 transition-colors">
          <i class="fas fa-pen mr-1"></i>수정
        </button>
        <button onclick="deleteCurrent()" class="text-xs font-bold px-3 py-1 bg-red-50 text-red-500 rounded-full hover:bg-red-100 transition-colors">
          <i class="fas fa-trash mr-1"></i>삭제
        </button>
      </div>
    </div>

    <div class="p-6 sm:p-8 space-y-6 pb-16">
      <div class="text-center space-y-3 mt-2">
        <div id="d-meta" class="text-xs font-bold px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full inline-block"></div>
        <h1 id="d-title" class="text-2xl sm:text-3xl font-bold text-stone-800 break-keep leading-tight"></h1>
        <p id="d-passage" class="text-emerald-600 font-medium"></p>
      </div>

      <div id="d-video-wrap" class="hidden space-y-2">
        <div id="d-video-iframe-wrap" class="hidden video-container shadow-md border border-stone-200">
          <iframe id="d-video" src="" title="설교 영상" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <a id="d-video-fallback" href="#" target="_blank" rel="noopener" class="text-xs text-stone-400 hover:text-emerald-600 flex items-center justify-end gap-1 transition-colors">
          <i class="fas fa-arrow-up-right-from-square"></i> 유튜브에서 바로 보기
        </a>
      </div>

      <div id="d-slides-wrap" class="hidden bg-white rounded-2xl p-6 border border-stone-200/60 shadow-sm relative overflow-hidden">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-bold text-stone-800 flex items-center gap-2">
            <i class="fas fa-images text-amber-600"></i> 설교 슬라이드
          </h2>
          <div id="d-slide-counter" class="text-xs font-bold px-3 py-1 bg-stone-100 text-stone-600 rounded-full">1 / 1</div>
        </div>
        <div class="relative w-full aspect-video bg-[#4f4339] rounded-xl overflow-hidden shadow-inner flex items-center justify-center group">
          <img id="d-slide-image" src="" class="w-full h-full object-contain" alt="설교 슬라이드">
          <button type="button" onclick="prevSlide()" class="absolute left-2 sm:left-3 top-1/2 -translate-y-1/2 w-10 h-10 bg-black/40 hover:bg-black/70 text-white rounded-full flex items-center justify-center backdrop-blur-sm transition-all z-10 shadow-md">
            <i class="fas fa-chevron-left"></i>
          </button>
          <button type="button" onclick="nextSlide()" class="absolute right-2 sm:right-3 top-1/2 -translate-y-1/2 w-10 h-10 bg-black/40 hover:bg-black/70 text-white rounded-full flex items-center justify-center backdrop-blur-sm transition-all z-10 shadow-md">
            <i class="fas fa-chevron-right"></i>
          </button>
        </div>
      </div>

      <div id="d-summary-wrap" class="hidden bg-[#fbf9f6] rounded-2xl p-6 border border-stone-200/60">
        <h3 class="text-sm font-bold text-stone-500 mb-3"><i class="fas fa-align-left mr-1"></i>본문 요약</h3>
        <p id="d-summary" class="text-stone-700 leading-relaxed break-keep whitespace-pre-wrap"></p>
      </div>

      <div id="d-highlights-wrap" class="hidden space-y-3">
        <h3 class="text-lg font-bold text-stone-800 flex items-center gap-2">
          <i class="fas fa-quote-left text-amber-600"></i> 핵심 구절 · 인용
        </h3>
        <div id="d-highlights" class="space-y-3"></div>
      </div>

      <div id="d-memo-wrap" class="hidden bg-amber-50/60 rounded-2xl p-6 border border-amber-200/60">
        <h3 class="text-sm font-bold text-amber-800 mb-2"><i class="fas fa-note-sticky mr-1"></i>나의 메모</h3>
        <p id="d-memo" class="text-stone-700 leading-relaxed break-keep whitespace-pre-wrap text-sm"></p>
      </div>

      <div id="d-tags" class="flex flex-wrap gap-2"></div>
    </div>
  </div>

  <!-- ================= FORM VIEW (추가/수정) ================= -->
  <div id="form-view" class="hidden fade-in bg-white min-h-screen">
    <div class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-stone-100 p-4 flex items-center justify-between shadow-sm">
      <button onclick="cancelForm()" class="text-stone-500 hover:text-stone-800 flex items-center gap-2 font-medium transition-colors">
        <i class="fas fa-arrow-left"></i> 취소
      </button>
      <h2 id="form-title-label" class="font-bold text-stone-800">설교 추가</h2>
      <div class="w-14"></div>
    </div>

    <form id="sermon-form" onsubmit="saveSermon(event)" class="p-6 sm:p-8 space-y-5 pb-16">
      <div>
        <label class="block text-sm font-bold text-stone-600 mb-1.5">제목 *</label>
        <input id="f-title" required type="text" placeholder="예: 성경이 말하는 진짜 성공"
          class="w-full px-3 py-2.5 rounded-xl border border-stone-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400/50 focus:border-emerald-400">
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-bold text-stone-600 mb-1.5">날짜</label>
          <input id="f-date" type="date" class="w-full px-3 py-2.5 rounded-xl border border-stone-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400/50 focus:border-emerald-400">
        </div>
        <div>
          <label class="block text-sm font-bold text-stone-600 mb-1.5">설교자</label>
          <input id="f-speaker" type="text" placeholder="예: 홍길동 목사"
            class="w-full px-3 py-2.5 rounded-xl border border-stone-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400/50 focus:border-emerald-400">
        </div>
      </div>

      <div>
        <label class="block text-sm font-bold text-stone-600 mb-1.5">성경 구절 (본문)</label>
        <input id="f-passage" type="text" placeholder="예: 이사야 55장 10절~11절"
          class="w-full px-3 py-2.5 rounded-xl border border-stone-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400/50 focus:border-emerald-400">
      </div>

      <div>
        <label class="block text-sm font-bold text-stone-600 mb-1.5">유튜브 링크 (선택)</label>
        <input id="f-youtube" type="text" placeholder="https://www.youtube.com/watch?v=..."
          class="w-full px-3 py-2.5 rounded-xl border border-stone-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400/50 focus:border-emerald-400">
      </div>

      <div>
        <label class="block text-sm font-bold text-stone-600 mb-1.5">설교 슬라이드(PPT를 이미지로 저장한 파일, 여러 장 선택 가능)</label>
        <input id="f-slides" type="file" accept="image/*" multiple
          class="w-full text-sm file:mr-3 file:px-3 file:py-2 file:rounded-lg file:border-0 file:bg-stone-100 file:text-stone-600 file:font-semibold hover:file:bg-stone-200">
        <p id="f-slides-info" class="text-xs text-stone-400 mt-1.5">PPT/키노트에서 "이미지로 내보내기"한 뒤 slide1, slide2... 순서로 모두 선택해서 올려주세요.</p>
      </div>

      <div>
        <label class="block text-sm font-bold text-stone-600 mb-1.5">본문 요약 / 원문 붙여넣기</label>
        <textarea id="f-summary" rows="6" placeholder="설교 내용을 요약하거나, 원문(대본·전사본)을 그대로 붙여넣으세요."
          class="w-full px-3 py-2.5 rounded-xl border border-stone-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400/50 focus:border-emerald-400"></textarea>
      </div>

      <div>
        <label class="block text-sm font-bold text-stone-600 mb-1.5">핵심 구절 · 인용 (한 줄에 하나씩)</label>
        <textarea id="f-highlights" rows="4" placeholder="기억하고 싶은 문장을 한 줄에 하나씩 적어주세요."
          class="w-full px-3 py-2.5 rounded-xl border border-stone-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400/50 focus:border-emerald-400"></textarea>
      </div>

      <div>
        <label class="block text-sm font-bold text-stone-600 mb-1.5">태그 (쉼표로 구분)</label>
        <input id="f-tags" type="text" placeholder="예: 소명, 성공, 가정"
          class="w-full px-3 py-2.5 rounded-xl border border-stone-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400/50 focus:border-emerald-400">
      </div>

      <div>
        <label class="block text-sm font-bold text-stone-600 mb-1.5">나의 메모</label>
        <textarea id="f-memo" rows="3" placeholder="개인적으로 느낀 점, 적용할 점 등을 적어보세요."
          class="w-full px-3 py-2.5 rounded-xl border border-stone-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400/50 focus:border-emerald-400"></textarea>
      </div>

      <input type="hidden" id="f-id">
      <button type="submit" class="w-full py-4 rounded-xl font-bold text-lg emerald-gradient text-white shadow-md hover:opacity-90 transition-all">
        <i class="fas fa-check-circle mr-1"></i> 저장하기
      </button>
    </form>
  </div>

</main>

<script>
const STORAGE_KEY = 'sermon_organizer_data_v1';

// 최초 배포시 아무 데이터도 없을 때를 위한 예시 시드(원하면 지워도 됩니다)
const SEED_SERMONS = [];

let sermons = [];
let currentId = null;
let activeSpeaker = null;
let activeTag = null;

let currentSlideList = [];
let currentSlideIdx = 0;

// 폼에서 새로 선택한 슬라이드 이미지(null = 새로 선택 안 함 → 기존 값 유지)
let pendingSlides = null;
let editingSlides = [];

function renderSlideViewer() {
  const wrap = document.getElementById('d-slides-wrap');
  if (!currentSlideList.length) {
    wrap.classList.add('hidden');
    return;
  }
  wrap.classList.remove('hidden');
  document.getElementById('d-slide-image').src = currentSlideList[currentSlideIdx];
  document.getElementById('d-slide-counter').innerText = `${currentSlideIdx + 1} / ${currentSlideList.length}`;
}

function prevSlide() {
  if (!currentSlideList.length) return;
  currentSlideIdx = (currentSlideIdx - 1 + currentSlideList.length) % currentSlideList.length;
  renderSlideViewer();
}

function nextSlide() {
  if (!currentSlideList.length) return;
  currentSlideIdx = (currentSlideIdx + 1) % currentSlideList.length;
  renderSlideViewer();
}

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { sermons = JSON.parse(raw); return; } catch(e) { /* fallthrough */ }
  }
  sermons = SEED_SERMONS.slice();
}

// candidateSermons를 저장 시도하고 성공 여부를 반환한다 (localStorage 용량 초과 대비)
function saveData(candidateSermons) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(candidateSermons));
    return true;
  } catch (err) {
    alert('저장 공간이 부족합니다. 슬라이드 이미지 수를 줄이거나(또는 낮은 해상도로), 예전 설교를 삭제한 뒤 다시 시도해주세요.');
    return false;
  }
}

function extractYoutubeId(url) {
  if (!url) return null;
  const trimmed = url.trim();
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtube\.com\/embed\/|youtu\.be\/|youtube\.com\/shorts\/|youtube\.com\/live\/|m\.youtube\.com\/watch\?v=)([\w-]{11})/
  ];
  for (const p of patterns) {
    const m = trimmed.match(p);
    if (m) return m[1];
  }
  if (/^[\w-]{11}$/.test(trimmed)) return trimmed;
  return null;
}

// 이미지를 캔버스로 리사이즈·압축해서 base64(JPEG)로 반환 (localStorage 용량 절약)
function resizeImage(file, maxWidth = 1400, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxWidth) {
          height = Math.round(height * (maxWidth / width));
          width = maxWidth;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('이미지를 읽을 수 없습니다.'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('파일을 읽을 수 없습니다.'));
    reader.readAsDataURL(file);
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.innerText = str == null ? '' : str;
  return div.innerHTML;
}

function renderFilters() {
  const speakers = [...new Set(sermons.map(s => s.speaker).filter(Boolean))].sort();
  const tags = [...new Set(sermons.flatMap(s => s.tags || []))].sort();

  const speakerWrap = document.getElementById('speaker-filter');
  speakerWrap.innerHTML = speakers.map(sp => `
    <button class="tag-pill ${activeSpeaker === sp ? 'active' : ''} text-xs font-semibold px-3 py-1.5 rounded-full border border-stone-200 bg-white text-stone-600 hover:border-emerald-400"
      onclick="toggleSpeaker('${escapeHtml(sp).replace(/'/g,"\\'")}')">
      <i class="fas fa-user text-[10px] mr-1"></i>${escapeHtml(sp)}
    </button>
  `).join('');

  const tagWrap = document.getElementById('tag-filter');
  tagWrap.innerHTML = tags.map(t => `
    <button class="tag-pill ${activeTag === t ? 'active' : ''} text-xs font-semibold px-3 py-1.5 rounded-full border border-stone-200 bg-white text-stone-600 hover:border-emerald-400"
      onclick="toggleTag('${escapeHtml(t).replace(/'/g,"\\'")}')">
      #${escapeHtml(t)}
    </button>
  `).join('');
}

function toggleSpeaker(sp) {
  activeSpeaker = activeSpeaker === sp ? null : sp;
  renderFilters();
  renderList();
}

function toggleTag(t) {
  activeTag = activeTag === t ? null : t;
  renderFilters();
  renderList();
}

function getFiltered() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  return sermons
    .filter(s => {
      if (activeSpeaker && s.speaker !== activeSpeaker) return false;
      if (activeTag && !(s.tags || []).includes(activeTag)) return false;
      if (q) {
        const hay = [s.title, s.speaker, s.passageRef, s.summary, ...(s.tags||[])].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    })
    .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
}

function renderList() {
  const list = getFiltered();
  const listEl = document.getElementById('sermon-list');
  const emptyEl = document.getElementById('empty-state');
  document.getElementById('count-badge').innerText = `${list.length}개`;

  if (list.length === 0) {
    listEl.innerHTML = '';
    emptyEl.classList.remove('hidden');
    return;
  }
  emptyEl.classList.add('hidden');

  listEl.innerHTML = list.map(s => `
    <div class="group p-4 rounded-xl border border-stone-200 hover:border-emerald-400 cursor-pointer transition-all card-shadow flex items-center justify-between bg-white"
      onclick="openDetail('${s.id}')">
      <div class="flex items-center gap-4 min-w-0">
        <div class="w-12 h-12 shrink-0 rounded-full wood-gradient text-white flex items-center justify-center shadow-sm">
          <i class="fas fa-book-bible"></i>
        </div>
        <div class="min-w-0">
          <h3 class="font-bold text-stone-800 text-base mb-1 truncate">${escapeHtml(s.title)}</h3>
          <p class="text-xs text-stone-500 font-medium truncate">
            ${s.date ? `<i class="fas fa-calendar-day mr-1"></i>${escapeHtml(s.date)}` : ''}
            ${s.speaker ? ` &nbsp;·&nbsp; <i class="fas fa-user mr-1"></i>${escapeHtml(s.speaker)}` : ''}
          </p>
        </div>
      </div>
      <i class="fas fa-chevron-right text-stone-300 group-hover:text-emerald-400"></i>
    </div>
  `).join('');
}

function openDetail(id) {
  const s = sermons.find(x => x.id === id);
  if (!s) return;
  currentId = id;

  document.getElementById('d-meta').innerText = [s.date, s.speaker].filter(Boolean).join(' · ') || '설교';
  document.getElementById('d-title').innerText = s.title;
  document.getElementById('d-passage').innerHTML = s.passageRef ? `<i class="fas fa-bible mr-1"></i> ${escapeHtml(s.passageRef)}` : '';

  const rawUrl = (s.youtubeUrl || '').trim();
  const vid = extractYoutubeId(rawUrl);
  const videoWrap = document.getElementById('d-video-wrap');
  const iframeWrap = document.getElementById('d-video-iframe-wrap');
  const fallback = document.getElementById('d-video-fallback');
  if (rawUrl) {
    videoWrap.classList.remove('hidden');
    fallback.href = rawUrl;
    if (vid) {
      document.getElementById('d-video').src = `https://www.youtube-nocookie.com/embed/${vid}`;
      iframeWrap.classList.remove('hidden');
    } else {
      document.getElementById('d-video').src = '';
      iframeWrap.classList.add('hidden');
    }
  } else {
    videoWrap.classList.add('hidden');
    iframeWrap.classList.add('hidden');
  }

  currentSlideList = s.slides || [];
  currentSlideIdx = 0;
  renderSlideViewer();

  const summaryWrap = document.getElementById('d-summary-wrap');
  if (s.summary) {
    document.getElementById('d-summary').innerText = s.summary;
    summaryWrap.classList.remove('hidden');
  } else {
    summaryWrap.classList.add('hidden');
  }

  const hlWrap = document.getElementById('d-highlights-wrap');
  const highlights = s.highlights || [];
  if (highlights.length) {
    document.getElementById('d-highlights').innerHTML = highlights.map(h => `
      <div class="bg-[#fbf9f6] rounded-xl p-4 border-l-4 border-amber-500 text-stone-700 text-sm leading-relaxed break-keep italic">
        "${escapeHtml(h)}"
      </div>
    `).join('');
    hlWrap.classList.remove('hidden');
  } else {
    hlWrap.classList.add('hidden');
  }

  const memoWrap = document.getElementById('d-memo-wrap');
  if (s.memo) {
    document.getElementById('d-memo').innerText = s.memo;
    memoWrap.classList.remove('hidden');
  } else {
    memoWrap.classList.add('hidden');
  }

  document.getElementById('d-tags').innerHTML = (s.tags || []).map(t => `
    <span class="text-xs font-semibold px-3 py-1 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-100">#${escapeHtml(t)}</span>
  `).join('');

  show('detail-view');
  window.scrollTo(0,0);
}

function goHome() {
  renderFilters();
  renderList();
  show('home-view');
  window.scrollTo(0,0);
}

function show(viewId) {
  ['home-view','detail-view','form-view'].forEach(id => {
    document.getElementById(id).classList.toggle('hidden', id !== viewId);
  });
}

function openForm() {
  document.getElementById('sermon-form').reset();
  document.getElementById('f-id').value = '';
  document.getElementById('form-title-label').innerText = '설교 추가';
  pendingSlides = null;
  editingSlides = [];
  document.getElementById('f-slides-info').innerText = 'PPT/키노트에서 "이미지로 내보내기"한 뒤 slide1, slide2... 순서로 모두 선택해서 올려주세요.';
  show('form-view');
  window.scrollTo(0,0);
}

function editCurrent() {
  const s = sermons.find(x => x.id === currentId);
  if (!s) return;
  document.getElementById('f-id').value = s.id;
  document.getElementById('f-title').value = s.title || '';
  document.getElementById('f-date').value = s.date || '';
  document.getElementById('f-speaker').value = s.speaker || '';
  document.getElementById('f-passage').value = s.passageRef || '';
  document.getElementById('f-youtube').value = s.youtubeUrl || '';
  document.getElementById('f-summary').value = s.summary || '';
  document.getElementById('f-highlights').value = (s.highlights || []).join('\n');
  document.getElementById('f-tags').value = (s.tags || []).join(', ');
  document.getElementById('f-memo').value = s.memo || '';
  document.getElementById('form-title-label').innerText = '설교 수정';

  pendingSlides = null;
  editingSlides = s.slides || [];
  document.getElementById('f-slides-info').innerText = editingSlides.length
    ? `기존 슬라이드 ${editingSlides.length}장 있음 (새 파일을 선택하면 전체 교체됩니다)`
    : 'PPT/키노트에서 "이미지로 내보내기"한 뒤 slide1, slide2... 순서로 모두 선택해서 올려주세요.';

  show('form-view');
  window.scrollTo(0,0);
}

document.getElementById('f-slides').addEventListener('change', async (e) => {
  const info = document.getElementById('f-slides-info');
  const files = Array.from(e.target.files).sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
  if (!files.length) return;
  info.innerText = `이미지 처리 중... (0/${files.length})`;
  try {
    const results = [];
    for (const f of files) {
      results.push(await resizeImage(f));
      info.innerText = `이미지 처리 중... (${results.length}/${files.length})`;
    }
    pendingSlides = results;
    info.innerText = `${results.length}장 선택됨 (저장 시 반영됩니다)`;
  } catch (err) {
    info.innerText = '이미지 처리 중 오류가 발생했습니다. 다른 이미지로 다시 시도해주세요.';
  }
});

function cancelForm() {
  if (currentId) { show('detail-view'); } else { goHome(); }
}

function saveSermon(e) {
  e.preventDefault();
  const id = document.getElementById('f-id').value || String(Date.now());
  const data = {
    id,
    title: document.getElementById('f-title').value.trim(),
    date: document.getElementById('f-date').value,
    speaker: document.getElementById('f-speaker').value.trim(),
    passageRef: document.getElementById('f-passage').value.trim(),
    youtubeUrl: document.getElementById('f-youtube').value.trim(),
    summary: document.getElementById('f-summary').value.trim(),
    highlights: document.getElementById('f-highlights').value.split('\n').map(x=>x.trim()).filter(Boolean),
    tags: document.getElementById('f-tags').value.split(',').map(x=>x.trim()).filter(Boolean),
    memo: document.getElementById('f-memo').value.trim(),
    slides: pendingSlides !== null ? pendingSlides : editingSlides,
  };

  const idx = sermons.findIndex(x => x.id === id);
  const nextSermons = sermons.slice();
  if (idx >= 0) nextSermons[idx] = data; else nextSermons.push(data);

  if (!saveData(nextSermons)) return;
  sermons = nextSermons;
  currentId = id;
  openDetail(id);
}

function deleteCurrent() {
  if (!currentId) return;
  if (!confirm('이 설교를 삭제할까요? 되돌릴 수 없습니다.')) return;
  const nextSermons = sermons.filter(x => x.id !== currentId);
  if (!saveData(nextSermons)) return;
  sermons = nextSermons;
  currentId = null;
  goHome();
}

function exportData() {
  const blob = new Blob([JSON.stringify(sermons, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `sermons_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const imported = JSON.parse(reader.result);
      if (!Array.isArray(imported)) throw new Error('배열 형식이 아닙니다.');
      const byId = new Map(sermons.map(s => [s.id, s]));
      imported.forEach(s => byId.set(s.id, s));
      const nextSermons = [...byId.values()];
      if (!saveData(nextSermons)) return;
      sermons = nextSermons;
      goHome();
      alert(`${imported.length}건을 가져왔습니다.`);
    } catch (err) {
      alert('가져오기에 실패했습니다: 올바른 JSON 파일인지 확인해주세요.');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

document.getElementById('search-input').addEventListener('input', renderList);

document.addEventListener('DOMContentLoaded', () => {
  loadData();
  goHome();
});
</script>
</body>
</html>
