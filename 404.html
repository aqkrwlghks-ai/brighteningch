<script>
const SUPABASE_URL = 'https://vogslryxeicemtotleph.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_XFxawpPt098rCpSPPE4U_A_-GJbrBuF';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const EDIT_PW_KEY = 'sermon_organizer_edit_pw';
// GitHub Pages 프로젝트 사이트 기본 경로. 저장소 이름이 바뀌면 이 값도 같이 바꿔야 함.
const BASE_PATH = '/brighteningch/';

let sermons = [];
let currentId = null;
let activeSpeaker = null;
let activeTag = null;

let currentSlideList = [];
let currentSlideIdx = 0;

// 폼에서 새로 선택한 슬라이드 이미지(null = 새로 선택 안 함 → 기존 값 유지)
let pendingSlides = null;
let editingSlides = [];

function renderSlideViewer() {
  const wrap = document.getElementById('d-slides-wrap');
  if (!currentSlideList.length) {
    wrap.classList.add('hidden');
    return;
  }
  wrap.classList.remove('hidden');
  document.getElementById('d-slide-image').src = currentSlideList[currentSlideIdx];
  document.getElementById('d-slide-counter').innerText = `${currentSlideIdx + 1} / ${currentSlideList.length}`;
}

function prevSlide() {
  if (!currentSlideList.length) return;
  currentSlideIdx = (currentSlideIdx - 1 + currentSlideList.length) % currentSlideList.length;
  renderSlideViewer();
}

function nextSlide() {
  if (!currentSlideList.length) return;
  currentSlideIdx = (currentSlideIdx + 1) % currentSlideList.length;
  renderSlideViewer();
}

function dbRowToSermon(row) {
  return {
    id: row.id,
    title: row.title,
    date: row.sermon_date,
    speaker: row.speaker,
    passageRef: row.passage_ref,
    youtubeUrl: row.youtube_url,
    summary: row.summary,
    highlights: row.highlights || [],
    tags: row.tags || [],
    memo: row.memo,
    slides: row.slides || [],
  };
}

function sermonToPayload(s, keepId) {
  return {
    id: keepId ? (s.id || null) : null,
    title: s.title,
    sermon_date: s.date || null,
    speaker: s.speaker,
    passage_ref: s.passageRef,
    youtube_url: s.youtubeUrl,
    summary: s.summary,
    highlights: s.highlights || [],
    tags: s.tags || [],
    memo: s.memo,
    slides: s.slides || [],
  };
}

async function loadData() {
  const { data, error } = await supabaseClient
    .from('sermons')
    .select('*')
    .order('sermon_date', { ascending: false, nullsFirst: false });
  if (error) {
    console.error(error);
    alert('설교 목록을 불러오지 못했습니다: ' + error.message);
    sermons = [];
    return;
  }
  sermons = data.map(dbRowToSermon);
}

function getSavedPassword() { return sessionStorage.getItem(EDIT_PW_KEY); }
function clearSavedPassword() { sessionStorage.removeItem(EDIT_PW_KEY); }

async function promptPassword() {
  let pw = getSavedPassword();
  if (pw) return pw;
  pw = prompt('편집 비밀번호를 입력하세요 (목사님·사용자님만 아는 공유 비밀번호)');
  if (!pw) return null;
  sessionStorage.setItem(EDIT_PW_KEY, pw);
  return pw;
}

function isWrongPasswordError(error) {
  return !!error && /비밀번호/.test(error.message || '');
}

function extractYoutubeId(url) {
  if (!url) return null;
  const trimmed = url.trim();
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtube\.com\/embed\/|youtu\.be\/|youtube\.com\/shorts\/|youtube\.com\/live\/|m\.youtube\.com\/watch\?v=)([\w-]{11})/
  ];
  for (const p of patterns) {
    const m = trimmed.match(p);
    if (m) return m[1];
  }
  if (/^[\w-]{11}$/.test(trimmed)) return trimmed;
  return null;
}

// 이미지를 캔버스로 리사이즈·압축해서 base64(JPEG)로 반환 (localStorage 용량 절약)
function resizeImage(file, maxWidth = 1400, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxWidth) {
          height = Math.round(height * (maxWidth / width));
          width = maxWidth;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('이미지를 읽을 수 없습니다.'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('파일을 읽을 수 없습니다.'));
    reader.readAsDataURL(file);
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.innerText = str == null ? '' : str;
  return div.innerHTML;
}

function renderFilters() {
  const speakers = [...new Set(sermons.map(s => s.speaker).filter(Boolean))].sort();
  const tags = [...new Set(sermons.flatMap(s => s.tags || []))].sort();

  const speakerWrap = document.getElementById('speaker-filter');
  speakerWrap.innerHTML = speakers.map(sp => `
    <button class="tag-pill ${activeSpeaker === sp ? 'active' : ''} text-xs font-semibold px-3 py-1.5 rounded-full border border-stone-200 bg-white text-stone-600 hover:border-emerald-400"
      onclick="toggleSpeaker('${escapeHtml(sp).replace(/'/g,"\\'")}')">
      <i class="fas fa-user text-[10px] mr-1"></i>${escapeHtml(sp)}
    </button>
  `).join('');

  const tagWrap = document.getElementById('tag-filter');
  tagWrap.innerHTML = tags.map(t => `
    <button class="tag-pill ${activeTag === t ? 'active' : ''} text-xs font-semibold px-3 py-1.5 rounded-full border border-stone-200 bg-white text-stone-600 hover:border-emerald-400"
      onclick="toggleTag('${escapeHtml(t).replace(/'/g,"\\'")}')">
      #${escapeHtml(t)}
    </button>
  `).join('');
}

function toggleSpeaker(sp) {
  activeSpeaker = activeSpeaker === sp ? null : sp;
  renderFilters();
  renderList();
}

function toggleTag(t) {
  activeTag = activeTag === t ? null : t;
  renderFilters();
  renderList();
}

function getFiltered() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  return sermons
    .filter(s => {
      if (activeSpeaker && s.speaker !== activeSpeaker) return false;
      if (activeTag && !(s.tags || []).includes(activeTag)) return false;
      if (q) {
        const hay = [s.title, s.speaker, s.passageRef, s.summary, ...(s.tags||[])].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    })
    .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
}

function renderList() {
  const list = getFiltered();
  const listEl = document.getElementById('sermon-list');
  const emptyEl = document.getElementById('empty-state');
  document.getElementById('count-badge').innerText = `${list.length}개`;

  if (list.length === 0) {
    listEl.innerHTML = '';
    emptyEl.classList.remove('hidden');
    return;
  }
  emptyEl.classList.add('hidden');

  listEl.innerHTML = list.map(s => `
    <div class="group p-4 rounded-xl border border-stone-200 hover:border-emerald-400 cursor-pointer transition-all card-shadow flex items-center justify-between bg-white"
      onclick="openDetail('${s.id}')">
      <div class="flex items-center gap-4 min-w-0">
        <div class="w-12 h-12 shrink-0 rounded-full wood-gradient text-white flex items-center justify-center shadow-sm">
          <i class="fas fa-book-bible"></i>
        </div>
        <div class="min-w-0">
          <h3 class="font-bold text-stone-800 text-base mb-1 truncate">${escapeHtml(s.title)}</h3>
          <p class="text-xs text-stone-500 font-medium truncate">
            ${s.date ? `<i class="fas fa-calendar-day mr-1"></i>${escapeHtml(s.date)}` : ''}
            ${s.speaker ? ` &nbsp;·&nbsp; <i class="fas fa-user mr-1"></i>${escapeHtml(s.speaker)}` : ''}
          </p>
        </div>
      </div>
      <i class="fas fa-chevron-right text-stone-300 group-hover:text-emerald-400"></i>
    </div>
  `).join('');
}

function openDetail(id) {
  const s = sermons.find(x => x.id === id);
  if (!s) return;
  currentId = id;

  document.getElementById('d-meta').innerText = [s.date, s.speaker].filter(Boolean).join(' · ') || '설교';
  document.getElementById('d-title').innerText = s.title;
  document.getElementById('d-passage').innerHTML = s.passageRef ? `<i class="fas fa-bible mr-1"></i> ${escapeHtml(s.passageRef)}` : '';

  const rawUrl = (s.youtubeUrl || '').trim();
  const vid = extractYoutubeId(rawUrl);
  const videoWrap = document.getElementById('d-video-wrap');
  const iframeWrap = document.getElementById('d-video-iframe-wrap');
  const fallback = document.getElementById('d-video-fallback');
  if (rawUrl) {
    videoWrap.classList.remove('hidden');
    fallback.href = rawUrl;
    if (vid) {
      document.getElementById('d-video').src = `https://www.youtube-nocookie.com/embed/${vid}`;
      iframeWrap.classList.remove('hidden');
    } else {
      document.getElementById('d-video').src = '';
      iframeWrap.classList.add('hidden');
    }
  } else {
    videoWrap.classList.add('hidden');
    iframeWrap.classList.add('hidden');
  }

  currentSlideList = s.slides || [];
  currentSlideIdx = 0;
  renderSlideViewer();

  const summaryWrap = document.getElementById('d-summary-wrap');
  if (s.summary) {
    document.getElementById('d-summary').innerText = s.summary;
    summaryWrap.classList.remove('hidden');
  } else {
    summaryWrap.classList.add('hidden');
  }

  const hlWrap = document.getElementById('d-highlights-wrap');
  const highlights = s.highlights || [];
  if (highlights.length) {
    document.getElementById('d-highlights').innerHTML = highlights.map(h => `
      <div class="bg-[#fbf9f6] rounded-xl p-4 border-l-4 border-amber-500 text-stone-700 text-sm leading-relaxed break-keep italic">
        "${escapeHtml(h)}"
      </div>
    `).join('');
    hlWrap.classList.remove('hidden');
  } else {
    hlWrap.classList.add('hidden');
  }

  const memoWrap = document.getElementById('d-memo-wrap');
  if (s.memo) {
    document.getElementById('d-memo').innerText = s.memo;
    memoWrap.classList.remove('hidden');
  } else {
    memoWrap.classList.add('hidden');
  }

  document.getElementById('d-tags').innerHTML = (s.tags || []).map(t => `
    <span class="text-xs font-semibold px-3 py-1 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-100">#${escapeHtml(t)}</span>
  `).join('');

  history.replaceState(null, '', BASE_PATH + id);
  show('detail-view');
  window.scrollTo(0,0);
}

function goHome() {
  history.replaceState(null, '', BASE_PATH);
  renderFilters();
  renderList();
  show('home-view');
  window.scrollTo(0,0);
}

async function shareLink(url, title, text) {
  if (navigator.share) {
    try { await navigator.share({ title, text, url }); } catch (e) { /* 취소 등은 무시 */ }
    return;
  }
  try {
    await navigator.clipboard.writeText(url);
    alert('링크가 복사되었습니다. 카카오톡 등에 붙여넣어 공유해보세요.');
  } catch (e) {
    prompt('아래 링크를 복사해서 공유하세요:', url);
  }
}

function shareCurrentSermon() {
  const s = sermons.find(x => x.id === currentId);
  if (!s) return;
  const url = location.origin + BASE_PATH + s.id;
  shareLink(url, s.title, [s.date, s.speaker].filter(Boolean).join(' · '));
}

// 홈 화면의 '이번주' 버튼: 목록이 아니라 가장 최근(이번 주) 설교 화면으로 바로 이동한다.
// 실제 공유(카톡 전송 등)는 그 설교 상세화면에 있는 공유 버튼으로 한다.
function viewLatestSermon() {
  if (!sermons.length) {
    alert('아직 등록된 설교가 없습니다.');
    return;
  }
  const latest = [...sermons].sort((a, b) => (b.date || '').localeCompare(a.date || ''))[0];
  openDetail(latest.id);
}

function show(viewId) {
  ['home-view','detail-view','form-view'].forEach(id => {
    document.getElementById(id).classList.toggle('hidden', id !== viewId);
  });
  updateEditorUI();
}

function isEditorUnlocked() { return !!getSavedPassword(); }

function updateEditorUI() {
  const on = isEditorUnlocked();
  document.querySelectorAll('.editor-only').forEach(el => el.classList.toggle('hidden', !on));
  const btn = document.getElementById('editor-toggle-btn');
  if (btn) {
    btn.innerHTML = on
      ? '<i class="fas fa-lock-open mr-1"></i>편집자 모드 (로그아웃)'
      : '<i class="fas fa-lock mr-1"></i>편집자이신가요? 로그인';
  }
}

function toggleEditorMode() {
  if (isEditorUnlocked()) {
    clearSavedPassword();
    updateEditorUI();
    return;
  }
  const pw = prompt('편집 비밀번호를 입력하세요 (목사님·사용자님만 아는 공유 비밀번호)');
  if (!pw) return;
  sessionStorage.setItem(EDIT_PW_KEY, pw);
  updateEditorUI();
}

function openForm() {
  document.getElementById('sermon-form').reset();
  document.getElementById('f-id').value = '';
  document.getElementById('form-title-label').innerText = '설교 추가';
  pendingSlides = null;
  editingSlides = [];
  document.getElementById('f-slides-info').innerText = 'PPT/키노트에서 "이미지로 내보내기"한 뒤 slide1, slide2... 순서로 모두 선택해서 올려주세요.';
  show('form-view');
  window.scrollTo(0,0);
}

function editCurrent() {
  const s = sermons.find(x => x.id === currentId);
  if (!s) return;
  document.getElementById('f-id').value = s.id;
  document.getElementById('f-title').value = s.title || '';
  document.getElementById('f-date').value = s.date || '';
  document.getElementById('f-speaker').value = s.speaker || '';
  document.getElementById('f-passage').value = s.passageRef || '';
  document.getElementById('f-youtube').value = s.youtubeUrl || '';
  document.getElementById('f-summary').value = s.summary || '';
  document.getElementById('f-highlights').value = (s.highlights || []).join('\n');
  document.getElementById('f-tags').value = (s.tags || []).join(', ');
  document.getElementById('f-memo').value = s.memo || '';
  document.getElementById('form-title-label').innerText = '설교 수정';

  pendingSlides = null;
  editingSlides = s.slides || [];
  document.getElementById('f-slides-info').innerText = editingSlides.length
    ? `기존 슬라이드 ${editingSlides.length}장 있음 (새 파일을 선택하면 전체 교체됩니다)`
    : 'PPT/키노트에서 "이미지로 내보내기"한 뒤 slide1, slide2... 순서로 모두 선택해서 올려주세요.';

  show('form-view');
  window.scrollTo(0,0);
}

document.getElementById('f-slides').addEventListener('change', async (e) => {
  const info = document.getElementById('f-slides-info');
  const files = Array.from(e.target.files).sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
  if (!files.length) return;
  info.innerText = `이미지 처리 중... (0/${files.length})`;
  try {
    const results = [];
    for (const f of files) {
      results.push(await resizeImage(f));
      info.innerText = `이미지 처리 중... (${results.length}/${files.length})`;
    }
    pendingSlides = results;
    info.innerText = `${results.length}장 선택됨 (저장 시 반영됩니다)`;
  } catch (err) {
    info.innerText = '이미지 처리 중 오류가 발생했습니다. 다른 이미지로 다시 시도해주세요.';
  }
});

function cancelForm() {
  if (currentId) { show('detail-view'); } else { goHome(); }
}

async function saveSermon(e) {
  e.preventDefault();
  const pw = await promptPassword();
  if (pw === null) return;

  const id = document.getElementById('f-id').value || null;
  const data = {
    id,
    title: document.getElementById('f-title').value.trim(),
    date: document.getElementById('f-date').value,
    speaker: document.getElementById('f-speaker').value.trim(),
    passageRef: document.getElementById('f-passage').value.trim(),
    youtubeUrl: document.getElementById('f-youtube').value.trim(),
    summary: document.getElementById('f-summary').value.trim(),
    highlights: document.getElementById('f-highlights').value.split('\n').map(x=>x.trim()).filter(Boolean),
    tags: document.getElementById('f-tags').value.split(',').map(x=>x.trim()).filter(Boolean),
    memo: document.getElementById('f-memo').value.trim(),
    slides: pendingSlides !== null ? pendingSlides : editingSlides,
  };

  const submitBtn = document.querySelector('#sermon-form button[type=submit]');
  submitBtn.disabled = true;
  submitBtn.innerText = '저장 중...';

  const { data: row, error } = await supabaseClient.rpc('sermons_upsert', {
    p_data: sermonToPayload(data, true),
    p_password: pw,
  });

  submitBtn.disabled = false;
  submitBtn.innerHTML = '<i class="fas fa-check-circle mr-1"></i> 저장하기';

  if (error) {
    if (isWrongPasswordError(error)) {
      clearSavedPassword();
      alert('비밀번호가 올바르지 않습니다. 다시 시도해주세요.');
    } else {
      alert('저장에 실패했습니다: ' + error.message);
    }
    return;
  }

  await loadData();
  currentId = row.id;
  openDetail(row.id);
}

async function deleteCurrent() {
  if (!currentId) return;
  if (!confirm('이 설교를 삭제할까요? 되돌릴 수 없습니다.')) return;
  const pw = await promptPassword();
  if (pw === null) return;

  const { error } = await supabaseClient.rpc('sermons_delete', { p_id: currentId, p_password: pw });
  if (error) {
    if (isWrongPasswordError(error)) {
      clearSavedPassword();
      alert('비밀번호가 올바르지 않습니다. 다시 시도해주세요.');
    } else {
      alert('삭제에 실패했습니다: ' + error.message);
    }
    return;
  }
  await loadData();
  currentId = null;
  goHome();
}

function exportData() {
  const blob = new Blob([JSON.stringify(sermons, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `sermons_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

async function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    let imported;
    try {
      imported = JSON.parse(reader.result);
      if (!Array.isArray(imported)) throw new Error('배열 형식이 아닙니다.');
    } catch (err) {
      alert('가져오기에 실패했습니다: 올바른 JSON 파일인지 확인해주세요.');
      event.target.value = '';
      return;
    }

    const pw = await promptPassword();
    if (pw === null) { event.target.value = ''; return; }

    let ok = 0, fail = 0;
    for (const s of imported) {
      const { error } = await supabaseClient.rpc('sermons_upsert', {
        p_data: sermonToPayload(s, false),
        p_password: pw,
      });
      if (error) {
        fail++;
        if (isWrongPasswordError(error)) { clearSavedPassword(); break; }
      } else {
        ok++;
      }
    }
    await loadData();
    goHome();
    alert(`${ok}건 가져오기 완료${fail ? `, ${fail}건 실패` : ''}`);
    event.target.value = '';
  };
  reader.readAsText(file);
}

document.getElementById('search-input').addEventListener('input', renderList);

document.addEventListener('DOMContentLoaded', async () => {
  await loadData();
  document.getElementById('app-loading').classList.add('hidden');
  const pathId = location.pathname.startsWith(BASE_PATH)
    ? location.pathname.slice(BASE_PATH.length).replace(/\/$/, '')
    : '';
  const linkedId = pathId || new URLSearchParams(location.search).get('id') || location.hash.slice(1);
  if (linkedId && sermons.some(s => s.id === linkedId)) {
    renderFilters();
    openDetail(linkedId);
  } else {
    goHome();
  }
});
</script>
